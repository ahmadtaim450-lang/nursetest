<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocBook — دخول الطبيب</title>

  <!-- نفس خطوط دوكبوك -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <!-- إزالة أي Service Worker قديم -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (rs) { rs.forEach(function (r) { r.unregister(); }); }).catch(function () {});
      if (window.caches) caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); }).catch(function () {});
    }
  </script>

  <style>
    :root {
      --primary:       #0d9488;
      --primary-dark:  #0f766e;
      --primary-light: #14b8a6;
      --cream:         #f3ede1;
      --cream-2:       #efe7d8;
      --ink:           #1f2937;
      --ink-soft:      #6b7280;
      --field-border:  #e7ddc9;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Tajawal', 'IBM Plex Sans Arabic', sans-serif;
      color: var(--ink);
      background: var(--cream);
      -webkit-font-smoothing: antialiased;
    }

    .auth-wrap { display: flex; min-height: 100vh; width: 100%; }

    /* ===== لوحة الوسائط (يمين) — جاهزة لفيديو أو صورة ===== */
    .auth-media {
      flex: 1 1 50%;
      position: relative;
      overflow: hidden;
      /* تدرّج احتياطي يظهر إن لم يوجد فيديو/صورة */
      background: linear-gradient(135deg, #0d9488 0%, #14b8a6 55%, #2dd4bf 100%);
    }
    /* الفيديو/الصورة يملأ القسم بالكامل */
    .auth-media-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    /* طبقة تظليل خفيفة فوق الوسائط لإبراز الشعار والنقاط */
    .auth-media-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(13,148,136,.22) 0%, rgba(15,118,110,.42) 100%);
    }
    .auth-brand-badge {
      position: absolute; top: 26px; left: 30px; z-index: 2;
      width: 56px; height: 56px; border-radius: 16px;
      background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.35);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      color: #fff; font-size: 1.4rem; backdrop-filter: blur(4px);
    }
    .auth-brand-badge img { width: 100%; height: 100%; object-fit: cover; }
    .auth-dots { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2; display: flex; gap: 9px; }
    .auth-dots span { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,.5); transition: all .25s; }
    .auth-dots span.active { width: 26px; border-radius: 6px; background: #fff; }

    /* ===== لوحة النموذج (يسار) ===== */
    .auth-form {
      flex: 1 1 50%; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px; background: linear-gradient(180deg, var(--cream) 0%, var(--cream-2) 100%);
    }
    .auth-card { width: 100%; max-width: 420px; }

    /* الشعار + DocBook فوق زر الدخول */
    .brand { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 30px; }
    .brand-logo {
      width: 76px; height: 76px; border-radius: 20px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      box-shadow: 0 12px 30px rgba(13,148,136,.28); color: #fff; font-size: 2rem;
    }
    .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
    .brand-name { font-size: 1.7rem; font-weight: 800; color: var(--ink); letter-spacing: .3px; }

    .auth-title { font-size: 1.9rem; font-weight: 800; margin: 0 0 10px; color: #111827; letter-spacing: -.5px; text-align: center; }
    .auth-sub   { font-size: .98rem; color: var(--ink-soft); margin: 0 0 28px; font-weight: 500; text-align: center; }

    .btn-google {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #fff; border: 1.5px solid var(--field-border); border-radius: 14px; padding: 16px 18px;
      font-family: inherit; font-size: 1.02rem; font-weight: 700; color: var(--ink); cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.05); transition: border-color .15s, box-shadow .15s, transform .12s;
    }
    .btn-google:hover { border-color: #c9bb9c; box-shadow: 0 8px 22px rgba(0,0,0,.1); }
    .btn-google:active { transform: scale(.99); }
    .btn-google:disabled { opacity: .7; cursor: default; }
    .btn-google svg { width: 22px; height: 22px; flex-shrink: 0; }

    .auth-msg { display: none; margin: 0 0 18px; padding: 12px 14px; border-radius: 12px; font-size: .88rem; font-weight: 600; text-align: center; }
    .auth-msg.error { display: block; background: #fee2e2; color: #b91c1c; }
    .auth-msg.info  { display: block; background: #ccfbf1; color: #0f766e; }

    .auth-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 40px; font-size: .82rem; color: var(--ink-soft); font-weight: 500; }
    .auth-footer .links { display: flex; gap: 18px; }
    .auth-footer a { color: var(--ink-soft); text-decoration: none; }
    .auth-footer a:hover { color: var(--primary); }

    .spin { width: 18px; height: 18px; border: 2.5px solid rgba(13,148,136,.3); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      .auth-media { display: none; }
      .auth-form  { flex-basis: 100%; }
    }
  </style>
</head>

<body>
  <div class="auth-wrap">

    <!-- ===== لوحة الوسائط (يمين) — ضع فيديو media.mp4 أو صورة media.jpg داخل مجلد doctor ===== -->
    <aside class="auth-media">
      <!-- فيديو الخلفية (اختياري): ضع ملفاً باسم media.mp4 — أو احذف هذا الوسم واترك التدرّج -->
      <video class="auth-media-bg" autoplay muted loop playsinline poster="media.jpg"
             onerror="this.style.display='none';">
        <source src="media.mp4" type="video/mp4" />
      </video>
      <!-- للصورة بدل الفيديو: احذف <video> أعلاه واستخدم هذا بدلاً منه:
      <img class="auth-media-bg" src="media.jpg" alt="" onerror="this.style.display='none';" /> -->
      <div class="auth-media-overlay"></div>
      <div class="auth-brand-badge">
        <img src="logo.png" alt="DocBook" onerror="this.style.display='none';this.parentNode.innerHTML='<i class=\'fas fa-plus\'></i>';" />
      </div>
      <div class="auth-dots"><span></span><span></span><span class="active"></span></div>
    </aside>

    <!-- ===== لوحة النموذج (يسار) ===== -->
    <section class="auth-form">
      <div class="auth-card">

        <!-- الشعار + DocBook فوق زر جوجل -->
        <div class="brand">
          <div class="brand-logo">
            <img src="logo.png" alt="DocBook" onerror="this.style.display='none';this.parentNode.innerHTML='<i class=\'fas fa-plus\'></i>';" />
          </div>
          <span class="brand-name">DocBook</span>
        </div>

        <h1 class="auth-title">مرحبًا بعودتك.</h1>
        <p class="auth-sub">سجّل الدخول للمتابعة إلى لوحة الطبيب.</p>

        <div class="auth-msg" id="authMsg"></div>

        <button class="btn-google" id="googleBtn" type="button">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22 22-9.8 22-22c0-1.3-.1-2.5-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 4.1 29.6 2 24 2 16 2 9.1 6.5 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 46c5.5 0 10.5-2.1 14.3-5.6l-6.6-5.6C29.6 36.6 26.9 37.7 24 37.7c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.1 42.4 16 46 24 46z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.6 5.6C41.7 36.3 46 30.7 46 24c0-1.3-.1-2.5-.4-3.5z"/>
          </svg>
          <span id="googleBtnLabel">متابعة باستخدام جوجل</span>
        </button>

        <div class="auth-footer">
          <span>© ٢٠٢٤ DocBook</span>
          <span class="links"><a href="#">سياسة الخصوصية</a><a href="#">الدعم</a></span>
        </div>

      </div>
    </section>
  </div>

  <!-- إعدادات العميل (Firebase + الأدوار) -->
  <script src="config.js"></script>

  <!-- Firebase: دخول جوجل فقط -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged,
             browserLocalPersistence, setPersistence, signOut }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const EXPECTED_ROLE = 'doctor';   // ← هذه صفحة دخول الطبيب
    const APP_PAGE      = 'app.html';

    const firebaseConfig = window.FIREBASE_CONFIG;   // ← يأتي من config.js (الملف الوحيد للتعديل)

    const _app  = initializeApp(firebaseConfig);
    const _auth = getAuth(_app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    const msgEl = document.getElementById('authMsg');
    const gBtn  = document.getElementById('googleBtn');
    const gLabel = document.getElementById('googleBtnLabel');

    function showMsg(text, type) { msgEl.textContent = text; msgEl.className = 'auth-msg ' + (type || 'info'); }
    function clearMsg() { msgEl.className = 'auth-msg'; msgEl.textContent = ''; }
    function rejectMsg(user) {
      var email = (user && user.email) ? user.email : '—';
      if (!window.DOCBOOK_ROLES) return 'تعذّر تحميل config.js — تأكّد من وجوده بجانب هذه الصفحة.';
      return 'الحساب (' + email + ') غير مصرّح لهذه اللوحة. المسموح: ' + (window.DOCBOOK_ROLES.doctor || []).join('، ');
    }

    function handleUser(user) {
      const role = (window.DOCBOOK_ROLE_OF ? window.DOCBOOK_ROLE_OF(user && user.email) : null);
      if (role === EXPECTED_ROLE) { location.replace(APP_PAGE); return true; }
      return false; // غير مصرّح لهذه اللوحة
    }

    onAuthStateChanged(_auth, function (user) {
      if (user && !user.isAnonymous) {
        if (!handleUser(user)) {
          var m = rejectMsg(user);
          signOut(_auth);
          showMsg(m, 'error');
        }
      }
    });

    async function googleLogin() {
      clearMsg();
      gBtn.disabled = true;
      gLabel.innerHTML = '<span class="spin"></span> جارٍ التحقق...';
      try {
        await setPersistence(_auth, browserLocalPersistence);
        const cred = await signInWithPopup(_auth, provider);
        if (!handleUser(cred.user)) {
          var m = rejectMsg(cred.user);
          await signOut(_auth);
          showMsg(m, 'error');
        }
      } catch (e) {
        console.error('[google-login]', e && e.code, e && e.message);
        if (e && e.code === 'auth/popup-closed-by-user') showMsg('تم إغلاق نافذة الدخول قبل الإكمال.', 'info');
        else if (e && e.code === 'auth/unauthorized-domain') showMsg('النطاق غير مُصرّح في Firebase. أضِف نطاقك في Authentication → Settings → Authorized domains.', 'error');
        else showMsg('تعذّر تسجيل الدخول: ' + ((e && e.code) || (e && e.message) || ''), 'error');
      } finally {
        gBtn.disabled = false;
        gLabel.textContent = 'متابعة باستخدام جوجل';
      }
    }

    gBtn.addEventListener('click', googleLogin);
  </script>
</body>
</html>
