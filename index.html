<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دوكبوك — دخول الطبيب</title>

  <!-- نفس خطوط دوكبوك -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <!-- إزالة أي Service Worker قديم -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (rs) { rs.forEach(function (r) { r.unregister(); }); }).catch(function () {});
      if (window.caches) caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); }).catch(function () {});
    }
  </script>

  <style>
    :root {
      --primary:       #0d9488;
      --primary-dark:  #0f766e;
      --primary-light: #14b8a6;
      --cream:         #f3ede1;
      --cream-2:       #efe7d8;
      --ink:           #1f2937;
      --ink-soft:      #6b7280;
      --field-bg:      #ffffff;
      --field-border:  #e7ddc9;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Tajawal', 'IBM Plex Sans Arabic', sans-serif;
      color: var(--ink);
      background: var(--cream);
      -webkit-font-smoothing: antialiased;
    }

    .auth-wrap { display: flex; min-height: 100vh; width: 100%; }

    /* لوحة الصورة (يمين) */
    .auth-media {
      flex: 1 1 50%;
      position: relative;
      background: linear-gradient(135deg, #0d9488 0%, #14b8a6 55%, #2dd4bf 100%);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .auth-media::before {
      content: ""; position: absolute; inset: 0;
      background:
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.16), transparent 45%),
        radial-gradient(circle at 20% 90%, rgba(0,0,0,.10), transparent 40%);
    }
    .auth-illustration {
      position: relative; width: 78%; max-width: 620px; border-radius: 18px;
      box-shadow: 0 30px 70px rgba(0,0,0,.28); object-fit: cover;
    }
    .auth-illustration-fallback {
      position: relative; width: 74%; max-width: 560px; aspect-ratio: 16 / 10;
      border-radius: 18px; background: rgba(255,255,255,.12);
      border: 1.5px solid rgba(255,255,255,.25); box-shadow: 0 30px 70px rgba(0,0,0,.22);
      display: none; align-items: center; justify-content: center;
      color: rgba(255,255,255,.85); font-size: 3rem;
    }
    .auth-brand-badge {
      position: absolute; top: 26px; left: 30px; width: 52px; height: 52px;
      border-radius: 15px; background: rgba(255,255,255,.16); border: 1.5px solid rgba(255,255,255,.3);
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.4rem; backdrop-filter: blur(4px);
    }
    .auth-dots { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 9px; }
    .auth-dots span { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,.45); transition: all .25s; }
    .auth-dots span.active { width: 26px; border-radius: 6px; background: #fff; }

    /* لوحة النموذج (يسار) */
    .auth-form {
      flex: 1 1 50%; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px; background: linear-gradient(180deg, var(--cream) 0%, var(--cream-2) 100%);
    }
    .auth-card { width: 100%; max-width: 420px; }

    .brand { display: flex; align-items: center; justify-content: center; gap: 9px; margin-bottom: 46px; }
    .brand-mark { width: 30px; height: 30px; color: var(--primary); font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }
    .brand-name { font-size: 1.25rem; font-weight: 800; color: var(--ink); }

    .auth-title { font-size: 2.1rem; font-weight: 800; margin: 0 0 10px; color: #111827; letter-spacing: -.5px; }
    .auth-sub   { font-size: .98rem; color: var(--ink-soft); margin: 0 0 30px; font-weight: 500; }

    .btn-google {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #fff; border: 1.5px solid var(--field-border); border-radius: 14px; padding: 15px 18px;
      font-family: inherit; font-size: 1rem; font-weight: 700; color: var(--ink); cursor: pointer;
      box-shadow: 0 2px 10px rgba(0,0,0,.04); transition: border-color .15s, box-shadow .15s, transform .12s;
    }
    .btn-google:hover { border-color: #d6c9ad; box-shadow: 0 6px 18px rgba(0,0,0,.08); }
    .btn-google:active { transform: scale(.99); }
    .btn-google svg { width: 21px; height: 21px; flex-shrink: 0; }

    .divider { display: flex; align-items: center; gap: 14px; margin: 26px 0 22px; color: var(--ink-soft); font-size: .84rem; font-weight: 600; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--field-border); }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: .9rem; font-weight: 700; color: #374151; margin-bottom: 8px; }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .field input {
      width: 100%; padding: 15px 17px; border: 1.5px solid var(--field-border); border-radius: 14px;
      font-family: inherit; font-size: .98rem; color: var(--ink); background: var(--field-bg); outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input::placeholder { color: #b7ac95; }
    .field input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(13,148,136,.12); }
    .pw-eye { position: absolute; left: 14px; background: none; border: none; cursor: pointer; color: var(--ink-soft); font-size: .95rem; padding: 6px; }

    .btn-primary {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--primary); color: #fff; border: none; border-radius: 14px; padding: 16px;
      font-family: inherit; font-size: 1.02rem; font-weight: 800; cursor: pointer; margin-top: 6px;
      box-shadow: 0 10px 24px rgba(13,148,136,.28); transition: background .15s, transform .12s, box-shadow .15s;
    }
    .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 12px 28px rgba(13,148,136,.34); }
    .btn-primary:active { transform: scale(.99); }

    .forgot { display: block; text-align: center; margin-top: 18px; color: #4b5563; font-size: .9rem; font-weight: 600; text-decoration: underline; cursor: pointer; background: none; border: none; width: 100%; font-family: inherit; }
    .forgot:hover { color: var(--primary); }

    .auth-msg { display: none; margin: 0 0 18px; padding: 12px 14px; border-radius: 12px; font-size: .88rem; font-weight: 600; text-align: center; }
    .auth-msg.error { display: block; background: #fee2e2; color: #b91c1c; }
    .auth-msg.info  { display: block; background: #ccfbf1; color: #0f766e; }

    .auth-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 40px; font-size: .82rem; color: var(--ink-soft); font-weight: 500; }
    .auth-footer .links { display: flex; gap: 18px; }
    .auth-footer a { color: var(--ink-soft); text-decoration: none; }
    .auth-footer a:hover { color: var(--primary); }

    .spin { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      .auth-media { display: none; }
      .auth-form  { flex-basis: 100%; }
    }
  </style>
</head>

<body>
  <div class="auth-wrap">

    <!-- لوحة الصورة (يمين) -->
    <aside class="auth-media">
      <div class="auth-brand-badge"><i class="fas fa-plus"></i></div>
      <!-- الصورة للإيحاء فقط — استبدلها بأي صورة باسم illustration.jpg داخل مجلد doctor -->
      <img class="auth-illustration" src="illustration.jpg" alt="لوحة العيادة"
           onerror="this.style.display='none';document.getElementById('mediaFallback').style.display='flex';" />
      <div class="auth-illustration-fallback" id="mediaFallback"><i class="fas fa-laptop-medical"></i></div>
      <div class="auth-dots"><span></span><span></span><span class="active"></span></div>
    </aside>

    <!-- لوحة النموذج (يسار) -->
    <section class="auth-form">
      <div class="auth-card">

        <div class="brand">
          <span class="brand-mark"><i class="fas fa-plus-square"></i></span>
          <span class="brand-name">دوكبوك</span>
        </div>

        <h1 class="auth-title">مرحبًا بعودتك.</h1>
        <p class="auth-sub">سجّل الدخول للمتابعة إلى لوحة الطبيب.</p>

        <div class="auth-msg" id="authMsg"></div>

        <button class="btn-google" id="googleBtn" type="button">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22 22-9.8 22-22c0-1.3-.1-2.5-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 4.1 29.6 2 24 2 16 2 9.1 6.5 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 46c5.5 0 10.5-2.1 14.3-5.6l-6.6-5.6C29.6 36.6 26.9 37.7 24 37.7c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.1 42.4 16 46 24 46z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.6 5.6C41.7 36.3 46 30.7 46 24c0-1.3-.1-2.5-.4-3.5z"/>
          </svg>
          <span id="googleBtnLabel">متابعة باستخدام جوجل</span>
        </button>

        <div class="divider">أو سجّل الدخول بالبريد الإلكتروني</div>

        <div class="field">
          <label for="email">البريد الإلكتروني</label>
          <div class="input-wrap">
            <input id="email" type="email" dir="ltr" placeholder="you@clinic.com" autocomplete="email" />
          </div>
        </div>

        <div class="field">
          <label for="password">كلمة المرور</label>
          <div class="input-wrap">
            <input id="password" type="password" dir="ltr" placeholder="٨ أحرف على الأقل" autocomplete="current-password" />
            <button class="pw-eye" type="button" aria-label="إظهار كلمة المرور"
              onclick="var i=document.getElementById('password');i.type=i.type==='password'?'text':'password';this.querySelector('i').className=i.type==='text'?'fas fa-eye-slash':'fas fa-eye';">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn-primary" id="emailBtn" type="button">
          <span>تسجيل الدخول</span>
          <i class="fas fa-arrow-left"></i>
        </button>

        <button class="forgot" id="forgotBtn" type="button">هل نسيت كلمة المرور؟</button>

        <div class="auth-footer">
          <span>© ٢٠٢٤ دوكبوك</span>
          <span class="links"><a href="#">سياسة الخصوصية</a><a href="#">الدعم</a></span>
        </div>

      </div>
    </section>
  </div>

  <!-- خريطة الأدوار -->
  <script src="roles.js"></script>

  <!-- Firebase: دخول جوجل فقط -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged,
             browserLocalPersistence, setPersistence, signOut }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const EXPECTED_ROLE = 'doctor';   // ← هذه صفحة دخول الطبيب
    const APP_PAGE      = 'app.html';

    const firebaseConfig = {
      apiKey:            "AIzaSyALjoxDqMB0W1Iq2ZOJvVviqg7ZNEnITF4",
      authDomain:        "testdoc-abc01.firebaseapp.com",
      projectId:         "testdoc-abc01",
      storageBucket:     "testdoc-abc01.firebasestorage.app",
      messagingSenderId: "790469564348",
      appId:             "1:790469564348:web:0a5b58912300acc7b03db9",
      measurementId:     "G-MDN0P4JYG7"
    };

    const _app  = initializeApp(firebaseConfig);
    const _auth = getAuth(_app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    const msgEl = document.getElementById('authMsg');
    const gBtn  = document.getElementById('googleBtn');
    const gLabel = document.getElementById('googleBtnLabel');

    function showMsg(text, type) { msgEl.textContent = text; msgEl.className = 'auth-msg ' + (type || 'info'); }
    function clearMsg() { msgEl.className = 'auth-msg'; msgEl.textContent = ''; }

    function handleUser(user) {
      const role = (window.DOCBOOK_ROLE_OF ? window.DOCBOOK_ROLE_OF(user && user.email) : null);
      if (role === EXPECTED_ROLE) { location.replace(APP_PAGE); return true; }
      return false; // غير مصرّح لهذه اللوحة
    }

    onAuthStateChanged(_auth, function (user) {
      if (user && !user.isAnonymous) {
        if (!handleUser(user)) {
          signOut(_auth);
          showMsg('هذا الحساب غير مصرّح له بالدخول إلى لوحة الطبيب.', 'error');
        }
      }
    });

    async function googleLogin() {
      clearMsg();
      gBtn.disabled = true;
      gLabel.innerHTML = '<span class="spin" style="border-color:rgba(13,148,136,.3);border-top-color:#0d9488;"></span> جارٍ التحقق...';
      try {
        await setPersistence(_auth, browserLocalPersistence);
        const cred = await signInWithPopup(_auth, provider);
        if (!handleUser(cred.user)) {
          await signOut(_auth);
          showMsg('هذا الحساب غير مصرّح له بالدخول إلى لوحة الطبيب.', 'error');
        }
      } catch (e) {
        console.error('[google-login]', e && e.code, e && e.message);
        if (e && e.code === 'auth/popup-closed-by-user') showMsg('تم إغلاق نافذة الدخول قبل الإكمال.', 'info');
        else if (e && e.code === 'auth/unauthorized-domain') showMsg('النطاق غير مُصرّح في Firebase. أضِف نطاقك في Authentication → Settings → Authorized domains.', 'error');
        else showMsg('تعذّر تسجيل الدخول: ' + ((e && e.code) || (e && e.message) || ''), 'error');
      } finally {
        gBtn.disabled = false;
        gLabel.textContent = 'متابعة باستخدام جوجل';
      }
    }

    gBtn.addEventListener('click', googleLogin);
    document.getElementById('emailBtn').addEventListener('click', function () { showMsg('الدخول متاح عبر «جوجل» فقط حالياً — استخدم الزر بالأعلى.', 'info'); });
    document.getElementById('forgotBtn').addEventListener('click', function () { showMsg('الدخول عبر «جوجل» لا يحتاج كلمة مرور.', 'info'); });
  </script>
</body>
</html>
