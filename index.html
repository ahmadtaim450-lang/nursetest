<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دوكبوك — تسجيل الدخول</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister()})}).catch(function(){});
      if(window.caches) caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k)})}).catch(function(){});
    }
  </script>

  <style>
    :root {
      --teal:        #0d9488;
      --teal-dark:   #0f766e;
      --teal-deep:   #115e59;
      --teal-light:  #14b8a6;
      --teal-glow:   #2dd4bf;
      --cream:       #f3ede1;
      --cream-warm:  #efe7d8;
      --cream-deep:  #e8dfcc;
      --ink:         #1f2937;
      --ink-soft:    #6b7280;
      --ink-light:   #9ca3af;
      --white:       #ffffff;
      --field-border:#e7ddc9;
      --gold:        #c99a4a;
      --red-err:     #dc2626;
      --red-bg:      #fef2f2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Tajawal', 'IBM Plex Sans Arabic', sans-serif;
      color: var(--ink);
      background: var(--cream);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── Noise texture overlay ─── */
    body::after {
      content: "";
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
    }

    /* ═══════ Main Layout ═══════ */
    .auth-wrap {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* ─── Media Panel (right side in RTL) ─── */
    .auth-media {
      flex: 1 1 52%;
      position: relative;
      background: linear-gradient(160deg, var(--teal-deep) 0%, var(--teal) 30%, var(--teal-light) 60%, var(--teal-glow) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
    }

    /* Animated gradient overlay */
    .auth-media::before {
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 75% 15%, rgba(255,255,255,.18) 0%, transparent 55%),
        radial-gradient(ellipse at 25% 85%, rgba(0,0,0,.07) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 50%, rgba(45,212,191,.15) 0%, transparent 60%);
      animation: mediaGlow 8s ease-in-out infinite alternate;
    }
    @keyframes mediaGlow {
      0%   { opacity: .8; }
      100% { opacity: 1; }
    }

    /* Floating decorative circles */
    .media-circle {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      animation: floatCircle 20s ease-in-out infinite;
    }
    .media-circle.c1 { width: 320px; height: 320px; top: -60px; right: -80px; animation-delay: 0s; }
    .media-circle.c2 { width: 200px; height: 200px; bottom: 40px; left: -40px; animation-delay: -7s; }
    .media-circle.c3 { width: 140px; height: 140px; top: 50%; right: 20%; animation-delay: -13s; border-style: dashed; }
    @keyframes floatCircle {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33%  { transform: translate(15px, -20px) rotate(3deg); }
      66%  { transform: translate(-10px, 10px) rotate(-2deg); }
    }

    /* Center content on media side */
    .media-center {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px;
    }

    .media-logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px; height: 80px;
      background: rgba(255,255,255,.15);
      border: 2px solid rgba(255,255,255,.25);
      border-radius: 22px;
      font-size: 2.4rem;
      color: #fff;
      backdrop-filter: blur(8px);
      margin-bottom: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,.15);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 20px 50px rgba(0,0,0,.15); }
      50%  { box-shadow: 0 20px 60px rgba(0,0,0,.22), 0 0 80px rgba(45,212,191,.2); }
    }

    .media-title {
      font-size: 2.4rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 12px;
      line-height: 1.3;
      text-shadow: 0 2px 20px rgba(0,0,0,.1);
    }
    .media-sub {
      font-size: 1.1rem;
      font-weight: 400;
      color: rgba(255,255,255,.8);
      max-width: 340px;
      line-height: 1.7;
    }

    /* Bottom dots */
    .media-dots {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 10px;
      z-index: 2;
    }
    .media-dots span {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,.4);
      transition: all .4s ease;
      cursor: pointer;
    }
    .media-dots span.active {
      width: 30px;
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 0 12px rgba(255,255,255,.5);
    }

    /* Top badge */
    .media-badge {
      position: absolute;
      top: 28px; right: 32px;
      padding: 8px 18px;
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: 30px;
      color: #fff;
      font-size: .85rem;
      font-weight: 700;
      backdrop-filter: blur(8px);
      z-index: 2;
      letter-spacing: .3px;
    }

    /* ─── Form Panel (left side in RTL) ─── */
    .auth-form {
      flex: 1 1 48%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      background: linear-gradient(175deg, var(--cream) 0%, var(--cream-warm) 60%, var(--cream-deep) 100%);
      position: relative;
    }

    /* Subtle pattern on form side */
    .auth-form::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(13,148,136,.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(201,154,74,.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .auth-card {
      position: relative;
      width: 100%;
      max-width: 440px;
      animation: cardIn .7s cubic-bezier(.22,.61,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Brand header */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 44px;
    }
    .brand-mark {
      width: 38px; height: 38px;
      background: var(--teal);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.1rem;
      box-shadow: 0 6px 20px rgba(13,148,136,.25);
    }
    .brand-name {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--ink);
      letter-spacing: -.3px;
    }
    .brand-role {
      margin-right: auto;
      display: flex;
      gap: 6px;
    }
    .brand-role span {
      font-size: .72rem;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 20px;
      background: var(--white);
      color: var(--ink-soft);
      border: 1px solid var(--field-border);
    }

    .auth-title {
      font-size: 2.3rem;
      font-weight: 900;
      color: #111827;
      margin-bottom: 8px;
      line-height: 1.25;
    }
    .auth-sub {
      font-size: 1rem;
      color: var(--ink-soft);
      margin-bottom: 34px;
      font-weight: 500;
    }

    /* Message */
    .auth-msg {
      display: none;
      padding: 13px 16px;
      border-radius: 13px;
      font-size: .9rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 22px;
      animation: msgIn .3s ease;
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .auth-msg.error { display: block; background: var(--red-bg); color: var(--red-err); border: 1px solid #fecaca; }
    .auth-msg.info  { display: block; background: #ccfbf1; color: var(--teal-dark); border: 1px solid #99f6e4; }

    /* Google button */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: var(--white);
      border: 2px solid var(--field-border);
      border-radius: 15px;
      padding: 16px 20px;
      font-family: inherit;
      font-size: 1.02rem;
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 3px 14px rgba(0,0,0,.04);
      transition: all .2s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-google::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(13,148,136,.04) 0%, transparent 50%);
      opacity: 0;
      transition: opacity .2s;
    }
    .btn-google:hover {
      border-color: var(--teal-light);
      box-shadow: 0 8px 28px rgba(13,148,136,.12);
      transform: translateY(-1px);
    }
    .btn-google:hover::after { opacity: 1; }
    .btn-google:active { transform: scale(.985); }
    .btn-google:disabled {
      opacity: .7;
      cursor: not-allowed;
      transform: none;
    }
    .btn-google svg { width: 22px; height: 22px; flex-shrink: 0; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
      color: var(--ink-light);
      font-size: .84rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--field-border), transparent);
    }

    /* Fields */
    .field-group { margin-bottom: 20px; }
    .field-group label {
      display: block;
      font-size: .92rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 9px;
      letter-spacing: -.2px;
    }
    .input-wrap { position: relative; }
    .field-group input {
      width: 100%;
      padding: 16px 18px;
      border: 2px solid var(--field-border);
      border-radius: 14px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: all .2s ease;
      direction: ltr;
      text-align: right;
    }
    .field-group input::placeholder { color: #c4b99f; }
    .field-group input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 5px rgba(13,148,136,.1);
      background: #fafffe;
    }
    .field-group input:focus::placeholder { color: #d4cbb2; }

    .pw-toggle {
      position: absolute;
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-light);
      font-size: 1rem;
      padding: 10px 14px;
      transition: color .15s;
      z-index: 1;
    }
    .pw-toggle:hover { color: var(--teal); }

    /* Primary button */
    .btn-primary {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      color: #fff;
      border: none;
      border-radius: 15px;
      padding: 17px;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 12px 30px rgba(13,148,136,.28);
      transition: all .2s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,.08) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }
    .btn-primary:hover::before { transform: translateX(100%); }
    .btn-primary:hover {
      box-shadow: 0 16px 38px rgba(13,148,136,.36);
      transform: translateY(-2px);
    }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled {
      opacity: .8;
      cursor: not-allowed;
      transform: none;
    }

    /* Forgot */
    .forgot-btn {
      display: block;
      text-align: center;
      margin-top: 20px;
      width: 100%;
      background: none;
      border: none;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 700;
      color: #4b5563;
      cursor: pointer;
      padding: 6px;
      transition: color .15s;
    }
    .forgot-btn:hover { color: var(--teal); }

    /* Footer */
    .auth-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 42px;
      font-size: .83rem;
      color: var(--ink-light);
      font-weight: 500;
    }
    .auth-footer .f-links { display: flex; gap: 20px; }
    .auth-footer .f-links a {
      color: var(--ink-light);
      text-decoration: none;
      transition: color .15s;
    }
    .auth-footer .f-links a:hover { color: var(--teal); }

    /* Spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(13,148,136,.2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    .spinner.white {
      border-color: rgba(255,255,255,.3);
      border-top-color: #fff;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .auth-media { display: none; }
      .auth-form  { flex-basis: 100%; }
      .auth-card { max-width: 420px; }
      .auth-title { font-size: 1.8rem; }
    }

    @media (max-width: 480px) {
      .auth-form { padding: 28px 18px; }
      .auth-title { font-size: 1.6rem; }
      .auth-footer { flex-direction: column; gap: 10px; text-align: center; }
    }
  </style>
</head>

<body>
  <div class="auth-wrap">

    <!-- ═══ Media Panel (right) ═══ -->
    <aside class="auth-media">
      <div class="media-circle c1"></div>
      <div class="media-circle c2"></div>
      <div class="media-circle c3"></div>

      <div class="media-badge">🏥 دوكبوك</div>

      <div class="media-center">
        <div class="media-logo-icon">
          <i class="fas fa-stethoscope"></i>
        </div>
        <h2 class="media-title">نظام إدارة<br>العيادة الذكي</h2>
        <p class="media-sub">سجّل دخولك للوصول إلى لوحة التحكم — إدارة الحجوزات، سجلات المرضى، وكل ما تحتاجه العيادة</p>
      </div>

      <div class="media-dots">
        <span></span><span></span><span class="active"></span>
      </div>
    </aside>

    <!-- ═══ Form Panel (left) ═══ -->
    <section class="auth-form">
      <div class="auth-card">

        <div class="brand">
          <div class="brand-mark"><i class="fas fa-plus"></i></div>
          <span class="brand-name">دوكبوك</span>
          <div class="brand-role">
            <span>طبيب</span>
            <span>ممرضة</span>
          </div>
        </div>

        <h1 class="auth-title">أهلاً بعودتك</h1>
        <p class="auth-sub">سجّل الدخول إلى حسابك للمتابعة</p>

        <div class="auth-msg" id="authMsg"></div>

        <!-- Google sign-in button -->
        <button class="btn-google" id="googleBtn" type="button">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22 22-9.8 22-22c0-1.3-.1-2.5-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 4.1 29.6 2 24 2 16 2 9.1 6.5 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 46c5.5 0 10.5-2.1 14.3-5.6l-6.6-5.6C29.6 36.6 26.9 37.7 24 37.7c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.1 42.4 16 46 24 46z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.6 5.6C41.7 36.3 46 30.7 46 24c0-1.3-.1-2.5-.4-3.5z"/>
          </svg>
          <span id="googleBtnLabel">متابعة باستخدام جوجل</span>
        </button>

        <div class="divider">أو بالبريد الإلكتروني</div>

        <div class="field-group">
          <label for="email">البريد الإلكتروني</label>
          <div class="input-wrap">
            <input id="email" type="email" dir="ltr" placeholder="you@clinic.com" autocomplete="email" />
          </div>
        </div>

        <div class="field-group">
          <label for="password">كلمة المرور</label>
          <div class="input-wrap">
            <input id="password" type="password" dir="ltr" placeholder="أدخل كلمة المرور" autocomplete="current-password" />
            <button class="pw-toggle" type="button" id="pwToggle" aria-label="إظهار كلمة المرور">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn-primary" id="emailBtn" type="button">
          <span id="emailBtnLabel">تسجيل الدخول</span>
          <i class="fas fa-arrow-left"></i>
        </button>

        <button class="forgot-btn" id="forgotBtn" type="button">نسيت كلمة المرور؟</button>

        <div class="auth-footer">
          <span>© ٢٠٢٤ دوكبوك — كل الحقوق محفوظة</span>
          <span class="f-links">
            <a href="#">الخصوصية</a>
            <a href="#">الدعم</a>
          </span>
        </div>

      </div>
    </section>

  </div>

  <!-- Role map -->
  <script src="roles.js"></script>

  <!-- Firebase: Google sign-in only -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getAuth, GoogleAuthProvider, signInWithPopup,
      onAuthStateChanged, browserLocalPersistence, setPersistence, signOut
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyALjoxDqMB0W1Iq2ZOJvVviqg7ZNEnITF4",
      authDomain:        "testdoc-abc01.firebaseapp.com",
      projectId:         "testdoc-abc01",
      storageBucket:     "testdoc-abc01.firebasestorage.app",
      messagingSenderId: "790469564348",
      appId:             "1:790469564348:web:0a5b58912300acc7b03db9",
      measurementId:     "G-MDN0P4JYG7"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    const msgEl  = document.getElementById('authMsg');
    const gBtn   = document.getElementById('googleBtn');
    const gLabel = document.getElementById('googleBtnLabel');

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className  = 'auth-msg ' + (type || 'info');
    }
    function clearMsg() {
      msgEl.className  = 'auth-msg';
      msgEl.textContent = '';
    }

    function routeByRole(user) {
      const role = (window.DOCBOOK_ROLE_OF ? window.DOCBOOK_ROLE_OF(user && user.email) : null);
      if (role === 'doctor') { location.replace('../doctor/index.html'); return true; }
      if (role === 'nurse')  { location.replace('../nurse/index.html');  return true; }
      return false;
    }

    // Auto-login for authenticated users
    onAuthStateChanged(auth, function(user) {
      if (user && !user.isAnonymous) {
        if (!routeByRole(user)) {
          signOut(auth);
          showMsg('هذا الحساب غير مصرّح له بالدخول. يرجى التواصل مع الإدارة.', 'error');
        }
      }
    });

    async function googleLogin() {
      clearMsg();
      gBtn.disabled = true;
      gLabel.innerHTML = '<span class="spinner"></span> جارٍ التحقق...';
      try {
        await setPersistence(auth, browserLocalPersistence);
        const cred = await signInWithPopup(auth, provider);
        if (!routeByRole(cred.user)) {
          await signOut(auth);
          showMsg('هذا الحساب غير مصرّح له بالدخول. يرجى التواصل مع الإدارة.', 'error');
        }
      } catch (e) {
        console.error('[google-login]', e && e.code, e && e.message);
        if (e && e.code === 'auth/popup-closed-by-user') {
          showMsg('تم إغلاق نافذة تسجيل الدخول — حاول مجدداً.', 'info');
        } else if (e && e.code === 'auth/unauthorized-domain') {
          showMsg('النطاق غير مصرّح في Firebase. أضف نطاقك في الإعدادات.', 'error');
        } else if (e && e.code === 'auth/cancelled-popup-request') {
          showMsg('تم إلغاء الطلب — حاول مجدداً.', 'info');
        } else {
          showMsg('تعذّر تسجيل الدخول: ' + ((e && e.code) || (e && e.message) || 'خطأ غير معروف'), 'error');
        }
      } finally {
        gBtn.disabled = false;
        gLabel.textContent = 'متابعة باستخدام جوجل';
      }
    }

    gBtn.addEventListener('click', googleLogin);

    // Password visibility toggle
    document.getElementById('pwToggle').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'fas fa-eye';
      }
    });

    // Email/password fields are for design — Google only
    document.getElementById('emailBtn').addEventListener('click', function() {
      showMsg('التسجيل متاح عبر جوجل فقط حالياً — استخدم زر «متابعة باستخدام جوجل» أعلاه.', 'info');
    });
    document.getElementById('forgotBtn').addEventListener('click', function() {
      showMsg('الدخول عبر جوجل لا يحتاج إلى كلمة مرور — استخدم زر جوجل أعلاه.', 'info');
    });
  </script>
</body>
</html>
